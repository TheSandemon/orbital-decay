<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITAL DECAY — Survive the Void</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            cursor: crosshair;
        }
        canvas { display: block; }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #D4A853;
            z-index: 10;
            pointer-events: none;
        }
        #ui h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(212,168,83,0.5);
            margin-bottom: 8px;
        }
        #score-display {
            font-size: 48px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0,255,136,0.6);
        }
        #mass-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        #mass-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #D4A853);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        #mass-label {
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 4px;
        }
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
        }
        #gameover {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            display: none;
        }
        #gameover h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            color: #ff3366;
            text-shadow: 0 0 40px rgba(255,51,102,0.7);
            letter-spacing: 6px;
            margin-bottom: 20px;
        }
        #gameover p {
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            margin-bottom: 30px;
        }
        #gameover button {
            background: transparent;
            border: 2px solid #D4A853;
            color: #D4A853;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            padding: 14px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #gameover button:hover {
            background: #D4A853;
            color: #0a0a0a;
            box-shadow: 0 0 30px rgba(212,168,83,0.5);
        }
        #multiplier {
            position: fixed;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #D4A853;
            z-index: 10;
            pointer-events: none;
        }
        #multiplier .label {
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.6;
        }
        #multiplier .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
        }
        #supernova-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        #supernova-bar .label {
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }
        #supernova-fill-wrap {
            width: 120px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-left: auto;
        }
        #supernova-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6644, #ff3366);
            border-radius: 2px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(255,51,102,0.6);
        }
        #announcement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            letter-spacing: 4px;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0,255,136,0.8);
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #wave-indicator {
            position: fixed;
            top: 110px;
            left: 20px;
            color: rgba(212,168,83,0.6);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
        }
        #powerups {
            position: fixed;
            top: 140px;
            left: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
            pointer-events: none;
        }
        .powerup-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .powerup-badge.active {
            opacity: 1;
        }
        .powerup-badge.shield {
            border: 1px solid #00ccff;
            color: #00ccff;
            text-shadow: 0 0 10px rgba(0,204,255,0.5);
            box-shadow: 0 0 10px rgba(0,204,255,0.2);
        }
        .powerup-badge.nova {
            border: 1px solid #ff6644;
            color: #ff6644;
            text-shadow: 0 0 10px rgba(255,102,68,0.5);
            box-shadow: 0 0 10px rgba(255,102,68,0.2);
        }
        .powerup-badge.slowmo {
            border: 1px solid #aa88ff;
            color: #aa88ff;
            text-shadow: 0 0 10px rgba(170,136,255,0.5);
            box-shadow: 0 0 10px rgba(170,136,255,0.2);
        }
        .powerup-badge .icon {
            font-size: 14px;
        }
        .powerup-badge .timer {
            font-size: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>ORBITAL DECAY</h1>
        <div id="score-display">0</div>
        <div id="mass-bar"><div id="mass-fill"></div></div>
        <div id="mass-label">STELLAR MASS</div>
    </div>
    <div id="multiplier">
        <div class="label">CHAIN</div>
        <div class="value" id="chain-display">x1</div>
    </div>
    <div id="wave-indicator">WAVE <span id="wave-num">1</span></div>
    <div id="powerups">
        <div class="powerup-badge shield" id="shield-badge">
            <span class="icon">🛡</span>
            <span>SHIELD</span>
            <span class="timer" id="shield-timer"></span>
        </div>
        <div class="powerup-badge nova" id="nova-badge">
            <span class="icon">💥</span>
            <span>NOVA READY</span>
        </div>
        <div class="powerup-badge slowmo" id="slowmo-badge">
            <span class="icon">⏱</span>
            <span>SLOW-MO</span>
            <span class="timer" id="slowmo-timer"></span>
        </div>
    </div>
    <div id="supernova-bar">
        <div class="label">SUPERNOVA</div>
        <div id="supernova-fill-wrap"><div id="supernova-fill"></div></div>
    </div>
    <div id="announcement"></div>
    <div id="instructions">CLICK to absorb &bull; DRAG to shift gravity &bull; SPACE for supernova &bull; SURVIVE</div>
    <div id="gameover">
        <h2>DECAYED</h2>
        <p id="final-score">Final Score: 0</p>
        <button onclick="restartGame()">RESTART</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, centerX, centerY;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            centerX = W / 2;
            centerY = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        // Audio context for sound effects
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        function playTone(freq, duration, type = 'sine', volume = 0.15) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        function playAbsorb() {
            playTone(440, 0.15, 'sine', 0.12);
            setTimeout(() => playTone(660, 0.1, 'sine', 0.08), 50);
        }
        function playExplode() {
            playTone(150, 0.4, 'sawtooth', 0.15);
            playTone(80, 0.5, 'square', 0.1);
        }
        function playSupernova() {
            playTone(200, 0.6, 'sawtooth', 0.2);
            playTone(100, 0.8, 'square', 0.15);
            setTimeout(() => playTone(50, 0.5, 'sine', 0.1), 100);
        }
        function playBlackHole() {
            playTone(60, 0.3, 'sawtooth', 0.1);
        }

        // Game state
        let score = 0;
        let gameRunning = true;
        let mass = 50;
        let maxMass = 150;
        let chain = 0;
        let chainTimer = 0;
        let wave = 1;
        let waveTimer = 0;
        let waveDebrisTarget = 8;
        let supernovaCharge = 100;
        let supernovaCooldown = 0;
        let star = { x: 0, y: 0, vx: 0, vy: 0, radius: 25, pulse: 0 };
        let particles = [];
        let debris = [];
        let blackHoles = [];
        let stars = [];
        let shockwaves = [];
        let mouse = { x: 0, y: 0, down: false, dragX: 0, dragY: 0 };
        let flashAlpha = 0;

        // Background stars
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * 2000 - 500,
                y: Math.random() * 2000 - 500,
                size: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.5 + 0.2,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        class Shockwave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.maxRadius = Math.max(W, H) * 0.8;
                this.alpha = 0.8;
                this.alive = true;
            }
            update() {
                this.radius += 25;
                this.alpha *= 0.92;
                if (this.radius > this.maxRadius) this.alive = false;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = '#ff6644';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#ff3366';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                // Inner ring
                ctx.strokeStyle = '#D4A853';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        class BlackHole {
            constructor() {
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(W, H) * 0.4 + Math.random() * 100;
                this.x = centerX + Math.cos(angle) * dist;
                this.y = centerY + Math.sin(angle) * dist;
                this.radius = 20 + Math.random() * 10;
                this.pulse = 0;
                this.lifetime = 600 + Math.random() * 400;
                this.age = 0;
                this.alive = true;
                this.drainTimer = 0;
                this.ringAngle = Math.random() * Math.PI * 2;
            }
            update(ts = 1) {
                this.age += ts;
                this.pulse += 0.08 * ts;
                this.ringAngle += 0.03 * ts;
                // Pull debris toward black hole
                debris.forEach(d => {
                    const dx = this.x - d.x;
                    const dy = this.y - d.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 300 && dist > 1) {
                        const force = (3 / (dist * 0.05)) * ts;
                        d.vx += (dx / dist) * force;
                        d.vy += (dy / dist) * force;
                    }
                });
                // Drain star mass slowly
                this.drainTimer++;
                if (this.drainTimer > 60 && gameRunning) {
                    this.drainTimer = 0;
                    const dx = this.x - centerX;
                    const dy = this.y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 300) {
                        mass = Math.max(10, mass - 0.3 * ts);
                    }
                }
                // Check if debris falls in
                debris.forEach(d => {
                    const dx = this.x - d.x;
                    const dy = this.y - d.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < this.radius) {
                        // Debris consumed by black hole - creates burst
                        for (let i = 0; i < 15; i++) {
                            particles.push(new Particle(d.x, d.y, '#9933ff'));
                        }
                        d.alive = false;
                        setTimeout(() => d.reset(), 500);
                    }
                });
                if (this.age > this.lifetime) {
                    this.alive = false;
                    setTimeout(() => this.reset(), 2000);
                }
            }
            draw() {
                const breathe = Math.sin(this.pulse) * 4;
                const r = this.radius + breathe;
                // Accretion disk rings
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.ringAngle);
                for (let i = 0; i < 3; i++) {
                    ctx.save();
                    ctx.rotate((i / 3) * Math.PI * 2);
                    ctx.strokeStyle = `rgba(153,51,255,${0.4 - i * 0.1})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 8]);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, r * (2 + i * 0.5), r * (0.5 + i * 0.2), 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                ctx.setLineDash([]);
                ctx.restore();
                // Core - pure black with violet rim
                const core = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
                core.addColorStop(0, '#000000');
                core.addColorStop(0.7, '#1a0033');
                core.addColorStop(1, '#9933ff');
                ctx.fillStyle = core;
                ctx.shadowColor = '#9933ff';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                ctx.fill();
                // Event horizon ring
                ctx.strokeStyle = '#cc66ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r + 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
                // Lifetime indicator
                const lifeRatio = 1 - this.age / this.lifetime;
                ctx.strokeStyle = `rgba(153,51,255,${lifeRatio * 0.5})`;
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.arc(this.x, this.y, r + 12, 0, Math.PI * 2 * lifeRatio);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        class Debris {
            constructor() {
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(W, H) * 0.6 + Math.random() * 200;
                this.x = centerX + Math.cos(angle) * dist;
                this.y = centerY + Math.sin(angle) * dist;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 4 + 2;
                this.type = Math.random() < 0.7 ? 'rock' : 'comet';
                this.color = this.type === 'comet' ? '#00ff88' : (Math.random() < 0.5 ? '#D4A853' : '#888');
                this.trail = [];
                this.alive = true;
                this.value = Math.floor(this.size * 10);
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitSpeed = (Math.random() * 0.02 + 0.005) * (Math.random() < 0.5 ? 1 : -1);
                this.mass = this.size * 0.5;
                this.stable = true;
                this.unstableTimer = Math.random() * 300 + 200;
                this.waveMode = 'orbit'; // orbit, spiral, chaotic
                this.wavePhase = Math.random() * Math.PI * 2;
            }
            update(ts = 1) {
                if (!this.stable) {
                    this.unstableTimer--;
                    if (this.unstableTimer <= 0) {
                        this.explode();
                        return;
                    }
                }
                // Wave-based motion depending on wave number
                const waveFreq = 0.5 + wave * 0.3;
                this.wavePhase += 0.01 * waveFreq * ts;
                const waveOffsetX = Math.sin(this.wavePhase) * 0.3 * wave;
                const waveOffsetY = Math.cos(this.wavePhase * 1.3) * 0.2 * wave;
                // Gravitational pull toward star
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const force = (mass * 0.001) / (dist * 0.01);
                this.vx += ((dx / dist) * force + waveOffsetX) * ts;
                this.vy += ((dy / dist) * force + waveOffsetY) * ts;
                // Slight orbital drift
                this.orbitAngle += this.orbitSpeed * (1 + wave * 0.1) * ts;
                this.vx += Math.cos(this.orbitAngle) * 0.1 * ts;
                this.vy += Math.sin(this.orbitAngle) * 0.1 * ts;
                // Drag
                this.vx *= (0.995 - (1 - ts) * 0.003);
                this.vy *= (0.995 - (1 - ts) * 0.003);
                this.x += this.vx;
                this.y += this.vy;
                // Trail
                this.trail.unshift({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 20) this.trail.pop();
                this.trail.forEach(t => t.alpha *= 0.92);
                // Check collision with star
                const starDist = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);
                if (starDist < star.radius + this.size) {
                    this.absorb();
                }
            }
            absorb() {
                if (mass + this.mass > maxMass) {
                    this.explode();
                    return;
                }
                mass += this.mass;
                score += this.value * (1 + chain * 0.5);
                chain++;
                chainTimer = 120;
                playAbsorb();
                // Particles burst
                for (let i = 0; i < 20; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
                this.alive = false;
                setTimeout(() => this.reset(), 500);
            }
            explode() {
                playExplode();
                for (let i = 0; i < 30; i++) {
                    particles.push(new Particle(this.x, this.y, '#ff3366', true));
                }
                if (gameRunning) {
                    if (isShielded()) {
                        // Shield absorbs the explosion
                        showAnnouncement('SHIELD PROTECTED!');
                        shieldActive = false;
                        shieldTimer = 0;
                        // Small screen shake instead
                        centerX += (Math.random() - 0.5) * 20;
                        centerY += (Math.random() - 0.5) * 20;
                    } else {
                        endGame();
                    }
                }
                this.alive = false;
                setTimeout(() => this.reset(), 1000);
            }
            draw() {
                // Trail
                ctx.beginPath();
                this.trail.forEach((t, i) => {
                    ctx.strokeStyle = `rgba(${this.type === 'comet' ? '0,255,136' : '212,168,83'},${t.alpha * 0.3})`;
                    ctx.lineWidth = this.size * 0.3;
                    if (i === 0) ctx.moveTo(t.x, t.y);
                    else ctx.lineTo(t.x, t.y);
                });
                ctx.stroke();
                // Body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                if (this.stable) {
                    grad.addColorStop(0, this.color);
                    grad.addColorStop(1, 'transparent');
                } else {
                    grad.addColorStop(0, '#ff3366');
                    grad.addColorStop(1, 'transparent');
                }
                ctx.fillStyle = grad;
                ctx.fill();
                // Glow
                ctx.shadowColor = this.stable ? this.color : '#ff3366';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color, explosive = false) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = explosive ? Math.random() * 8 + 2 : Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 3 + 1;
                this.decay = explosive ? 0.03 : 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Create debris
        for (let i = 0; i < 8; i++) {
            debris.push(new Debris());
        }

        // Create initial black hole
        blackHoles.push(new BlackHole());

        // ========== POWERUP SYSTEM ==========
        class Powerup {
            constructor() {
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(W, H) * 0.35 + Math.random() * 150;
                this.x = centerX + Math.cos(angle) * dist;
                this.y = centerY + Math.sin(angle) * dist;
                const types = ['shield', 'nova', 'slowmo'];
                // Weight toward shield early, nova later
                const roll = Math.random();
                if (wave < 3) {
                    this.type = roll < 0.6 ? 'shield' : (roll < 0.85 ? 'slowmo' : 'nova');
                } else {
                    this.type = roll < 0.4 ? 'shield' : (roll < 0.6 ? 'slowmo' : 'nova');
                }
                this.pulse = 0;
                this.alive = true;
                this.size = 12;
                this.lifetime = 600; // ~10 seconds
                this.age = 0;
            }
            update() {
                this.pulse += 0.1;
                this.age++;
                // Slight drift toward star
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 1) {
                    this.x += (dx / dist) * 0.15;
                    this.y += (dy / dist) * 0.15;
                }
                // Check collision with star
                const starDist = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);
                if (starDist < star.radius + this.size) {
                    this.collect();
                    return;
                }
                if (this.age > this.lifetime) {
                    this.fade();
                }
            }
            collect() {
                playAbsorb();
                // Big burst particles
                const color = this.type === 'shield' ? '#00ccff' : (this.type === 'nova' ? '#ff6644' : '#aa88ff');
                for (let i = 0; i < 30; i++) {
                    particles.push(new Particle(this.x, this.y, color, true));
                }
                if (this.type === 'shield') {
                    shieldActive = true;
                    shieldTimer = 600; // 10 seconds
                    showAnnouncement('SHIELD ACTIVE');
                } else if (this.type === 'nova') {
                    // Instant full supernova charge
                    supernovaCharge = 100;
                    supernovaCooldown = 0;
                    showAnnouncement('NOVA CHARGED!');
                    // Flash effect
                    flashAlpha = 0.3;
                } else if (this.type === 'slowmo') {
                    slowmoActive = true;
                    slowmoTimer = 300; // 5 seconds
                    showAnnouncement('SLOW-MO');
                }
                this.alive = false;
                setTimeout(() => this.reset(), 3000 + Math.random() * 2000);
            }
            fade() {
                this.alive = false;
                setTimeout(() => this.reset(), 4000);
            }
            draw() {
                const breathe = Math.sin(this.pulse) * 3;
                const r = this.size + breathe;
                const color = this.type === 'shield' ? '#00ccff' : (this.type === 'nova' ? '#ff6644' : '#aa88ff');
                const decayAlpha = this.age > this.lifetime - 120 ? (this.lifetime - this.age) / 120 : 1;
                ctx.save();
                ctx.globalAlpha = decayAlpha;
                // Outer glow
                ctx.shadowColor = color;
                ctx.shadowBlur = 25;
                // Hexagon shape
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const px = this.x + Math.cos(a) * r;
                    const py = this.y + Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.4, color);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();
                // Inner icon hint
                ctx.fillStyle = '#ffffff';
                ctx.font = `${r}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;
                // Pulsing ring
                ctx.strokeStyle = `${color}88`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r + 8 + Math.sin(this.pulse * 2) * 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        let powerups = [];
        // Spawn initial powerups
        powerups.push(new Powerup());
        setTimeout(() => powerups.push(new Powerup()), 5000);
        // Periodically spawn more powerups
        setInterval(() => {
            if (gameRunning && powerups.length < 2) {
                powerups.push(new Powerup());
            }
        }, 12000);

        // Powerup state
        let shieldActive = false;
        let shieldTimer = 0;
        let slowmoActive = false;
        let slowmoTimer = 0;
        let timeScale = 1;

        // Decay powerup timers
        setInterval(() => {
            if (shieldTimer > 0) {
                shieldTimer--;
                if (shieldTimer <= 0) shieldActive = false;
            }
            if (slowmoTimer > 0) {
                slowmoTimer--;
                if (slowmoTimer <= 0) slowmoActive = false;
            }
            timeScale = slowmoActive ? 0.3 : 1;
        }, 50);

        // When shield is active, debris explosions don't end game
        function isShielded() {
            return shieldActive;
        }

        // Spawn additional black holes over time
        setInterval(() => {
            if (gameRunning && blackHoles.filter(b => b.alive).length < 1 + Math.floor(wave / 3)) {
                const bh = new BlackHole();
                bh.lifetime = 400 + Math.random() * 300;
                blackHoles.push(bh);
                playBlackHole();
                showAnnouncement('SINGULARITY DETECTED');
            }
        }, 20000);

        // Wave progression
        function checkWaveAdvance() {
            waveTimer++;
            if (waveTimer > 1800) { // Every ~30 seconds
                wave++;
                waveTimer = 0;
                waveDebrisTarget = Math.min(16, 8 + wave);
                // Spawn more debris to match wave
                while (debris.length < waveDebrisTarget) {
                    debris.push(new Debris());
                }
                showAnnouncement(`WAVE ${wave}`);
            }
        }

        // Supernova
        function triggerSupernova() {
            if (supernovaCooldown > 0 || !gameRunning) return;
            playSupernova();
            supernovaCharge = 0;
            supernovaCooldown = 300; // 5 seconds at 60fps
            flashAlpha = 0.4;
            // Push all debris away from star
            shockwaves.push(new Shockwave(centerX, centerY));
            debris.forEach(d => {
                const dx = d.x - centerX;
                const dy = d.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 1) {
                    const pushForce = 15;
                    d.vx += (dx / dist) * pushForce;
                    d.vy += (dy / dist) * pushForce;
                }
            });
            // Also disrupt black holes briefly
            blackHoles.forEach(bh => {
                bh.age += 50; // Shorten lifetime
            });
        }

        // Star pulse
        function drawStar() {
            star.pulse += 0.05;
            const breathe = Math.sin(star.pulse) * 3;
            const r = star.radius + breathe;
            // Outer glow
            const glow = ctx.createRadialGradient(centerX, centerY, r * 0.5, centerX, centerY, r * 4);
            glow.addColorStop(0, 'rgba(212,168,83,0.3)');
            glow.addColorStop(0.5, 'rgba(0,255,136,0.1)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, r * 4, 0, Math.PI * 2);
            ctx.fill();
            // Core
            const core = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r);
            core.addColorStop(0, '#ffffff');
            core.addColorStop(0.3, '#D4A853');
            core.addColorStop(0.7, '#ff8800');
            core.addColorStop(1, '#ff4400');
            ctx.fillStyle = core;
            ctx.shadowColor = '#D4A853';
            ctx.shadowBlur = 40;
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // Mass indicator ring
            const massRatio = mass / maxMass;
            ctx.strokeStyle = `rgba(${massRatio > 0.8 ? '255,51,102' : '0,255,136'},0.5)`;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, r + 15 + massRatio * 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            // Flash effect for supernova
            if (flashAlpha > 0) {
                ctx.save();
                ctx.globalAlpha = flashAlpha;
                const flash = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H));
                flash.addColorStop(0, '#ffffff');
                flash.addColorStop(0.3, 'rgba(255,102,68,0.5)');
                flash.addColorStop(1, 'transparent');
                ctx.fillStyle = flash;
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
                flashAlpha *= 0.85;
            }
        }

        function drawBackground() {
            // Deep space gradient
            const bg = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H) * 0.7);
            bg.addColorStop(0, '#0f0f15');
            bg.addColorStop(1, '#050508');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);
            // Stars
            stars.forEach(s => {
                s.twinkle += 0.02;
                const alpha = s.alpha * (0.7 + Math.sin(s.twinkle) * 0.3);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x % W, s.y % H, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            // Gravity field hint
            if (mouse.down) {
                const dx = mouse.x - centerX;
                const dy = mouse.y - centerY;
                ctx.strokeStyle = 'rgba(0,255,136,0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 100 + i * 60, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function updateUI() {
            document.getElementById('score-display').textContent = Math.floor(score);
            document.getElementById('mass-fill').style.width = `${(mass / maxMass) * 100}%`;
            document.getElementById('chain-display').textContent = `x${1 + chain * 0.5}`;
            document.getElementById('wave-num').textContent = wave;
            if (mass / maxMass > 0.8) {
                document.getElementById('mass-fill').style.background = 'linear-gradient(90deg, #ff3366, #ff6644)';
            } else {
                document.getElementById('mass-fill').style.background = 'linear-gradient(90deg, #00ff88, #D4A853)';
            }
            // Supernova bar
            const supChargePct = (supernovaCharge / 100) * 100;
            document.getElementById('supernova-fill').style.width = `${supChargePct}%`;
            // Powerup badges
            const shieldBadge = document.getElementById('shield-badge');
            const slowmoBadge = document.getElementById('slowmo-badge');
            const novaBadge = document.getElementById('nova-badge');
            shieldBadge.classList.toggle('active', shieldActive);
            slowmoBadge.classList.toggle('active', slowmoActive);
            novaBadge.classList.toggle('active', supernovaCharge >= 100 && !gameRunning === false);
            if (shieldActive) {
                document.getElementById('shield-timer').textContent = Math.ceil(shieldTimer / 60) + 's';
            } else {
                document.getElementById('shield-timer').textContent = '';
            }
            if (slowmoActive) {
                document.getElementById('slowmo-timer').textContent = Math.ceil(slowmoTimer / 60) + 's';
            } else {
                document.getElementById('slowmo-timer').textContent = '';
            }
        }

        let announcementTimeout = null;
        function showAnnouncement(text) {
            const el = document.getElementById('announcement');
            el.textContent = text;
            el.style.opacity = 1;
            if (announcementTimeout) clearTimeout(announcementTimeout);
            announcementTimeout = setTimeout(() => {
                el.style.opacity = 0;
            }, 2000);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('gameover').style.display = 'block';
            document.getElementById('final-score').textContent = `Final Score: ${Math.floor(score)} — Wave ${wave}`;
        }

        window.restartGame = function() {
            score = 0;
            mass = 50;
            chain = 0;
            wave = 1;
            waveTimer = 0;
            waveDebrisTarget = 8;
            supernovaCharge = 100;
            supernovaCooldown = 0;
            gameRunning = true;
            shieldActive = false;
            shieldTimer = 0;
            slowmoActive = false;
            slowmoTimer = 0;
            debris.forEach(d => d.reset());
            blackHoles.forEach(bh => bh.reset());
            powerups.forEach(p => p.reset());
            particles.length = 0;
            shockwaves.length = 0;
            document.getElementById('gameover').style.display = 'none';
        };

        // Input
        canvas.addEventListener('mousedown', e => {
            initAudio();
            mouse.down = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            if (mouse.down) {
                centerX += (e.clientX - centerX) * 0.02;
                centerY += (e.clientY - centerY) * 0.02;
            }
        });
        canvas.addEventListener('mouseup', () => mouse.down = false);
        canvas.addEventListener('mouseleave', () => mouse.down = false);

        // Touch
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            initAudio();
            mouse.down = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            centerX += (mouse.x - centerX) * 0.02;
            centerY += (mouse.y - centerY) * 0.02;
        });
        canvas.addEventListener('touchend', () => mouse.down = false);

        // Keyboard
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                initAudio();
                triggerSupernova();
            }
        });

        // Gradually destabilize debris
        setInterval(() => {
            debris.forEach(d => {
                if (d.stable && d.trail.length > 5) {
                    if (Math.random() < 0.01 && mass < maxMass * 0.7) {
                        d.stable = false;
                        d.unstableTimer = 200 + Math.random() * 100;
                    }
                }
            });
        }, 1000);

        // Slowly lose mass over time
        setInterval(() => {
            if (gameRunning && mass > 30) {
                mass -= 0.1;
            }
        }, 100);

        // Charge supernova
        setInterval(() => {
            if (gameRunning && supernovaCharge < 100) {
                supernovaCharge = Math.min(100, supernovaCharge + 1);
            }
            if (supernovaCooldown > 0) supernovaCooldown--;
        }, 50);

        function loop() {
            ctx.clearRect(0, 0, W, H);
            drawBackground();
            // Slow-mo overlay
            if (slowmoActive) {
                ctx.save();
                ctx.globalAlpha = 0.08;
                ctx.fillStyle = '#aa88ff';
                ctx.fillRect(0, 0, W, H);
                // Vignette
                const vig = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H) * 0.6);
                vig.addColorStop(0, 'transparent');
                vig.addColorStop(1, 'rgba(100,50,200,0.3)');
                ctx.globalAlpha = 0.15;
                ctx.fillStyle = vig;
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
            }
            if (gameRunning) {
                checkWaveAdvance();
                // Update chain timer
                if (chainTimer > 0) chainTimer--;
                else chain = 0;
                // Update debris (slow-mo scales velocity)
                const ts = slowmoActive ? 0.3 : 1;
                debris.forEach(d => {
                    d.update(ts);
                });
            }
            // Update black holes
            blackHoles = blackHoles.filter(bh => bh.alive);
            blackHoles.forEach(bh => bh.update(slowmoActive ? 0.3 : 1));
            // Update powerups
            powerups = powerups.filter(p => p.alive);
            powerups.forEach(p => p.update());
            // Update shockwaves
            shockwaves = shockwaves.filter(sw => sw.alive);
            shockwaves.forEach(sw => sw.update());
            // Update particles
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => p.update());
            // Draw shockwaves
            shockwaves.forEach(sw => sw.draw());
            // Draw debris
            debris.forEach(d => d.draw());
            // Draw black holes
            blackHoles.forEach(bh => bh.draw());
            // Draw powerups
            powerups.forEach(p => p.draw());
            // Draw particles
            particles.forEach(p => p.draw());
            drawStar();
            updateUI();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
